<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel AI Köməkçisi</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 24px; }
    #drop-zone {
      border: 2px dashed #ccc; border-radius: 12px;
      padding: 40px; text-align: center; color: #999;
      cursor: pointer; margin-bottom: 24px;
      transition: border-color 0.2s;
    }
    #drop-zone:hover { border-color: #555; color: #555; }
    #file-input { display: none; }
    #preview { overflow-x: auto; margin-top: 20px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th { background: #f5f5f5; padding: 8px 12px; text-align: left; border: 1px solid #e0e0e0; }
    td { padding: 8px 12px; border: 1px solid #e0e0e0; }
    tr:hover td { background: #fafafa; }
    #file-name { font-size: 13px; color: #555; margin-top: 8px; }
    #analyze-btn {
      display: none; margin-top: 20px;
      background: #2563eb; color: white;
      border: none; padding: 12px 28px;
      border-radius: 8px; font-size: 15px;
      cursor: pointer; width: 100%;
    }
    #analyze-btn:hover { background: #1d4ed8; }
    #analyze-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    #result {
      margin-top: 24px; padding: 20px;
      background: #f0f9ff; border-radius: 12px;
      border: 1px solid #bae6fd;
      font-size: 14px; line-height: 1.8;
      white-space: pre-wrap; display: none;
    }
    #result h3 { margin-top: 0; color: #0369a1; }
  </style>
</head>
<body>

  <h1>📊 Excel AI Köməkçisi</h1>
  <p class="sub">Excel faylını yüklə, xətaları birlikdə tapaq.</p>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    📂 Faylı bura sürüklə və ya klikləyərək seç
    <br><small>(.xlsx, .xls, .csv dəstəklənir)</small>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
  <div id="file-name"></div>
  <div id="preview"></div>

  <button id="analyze-btn" onclick="analyzeData()">
    🤖 AI ilə Xətaları Analiz Et
  </button>

  <div id="result">
    <h3>🔍 AI Analiz Nəticəsi</h3>
    <div id="result-text"></div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const preview = document.getElementById('preview');
    const fileName = document.getElementById('file-name');
    const analyzeBtn = document.getElementById('analyze-btn');
    const result = document.getElementById('result');
    const resultText = document.getElementById('result-text');

    let tableData = '';

    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#333'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#ccc');
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.borderColor = '#ccc';
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      fileName.textContent = '✅ Fayl: ' + file.name;
      const reader = new FileReader();
      reader.onload = e => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        tableData = rows.map(r => r.join('\t')).join('\n');
        showTable(rows.slice(0, 51));
        analyzeBtn.style.display = 'block';
        result.style.display = 'none';
      };
      reader.readAsArrayBuffer(file);
    }

    function showTable(rows) {
      if (!rows.length) { preview.innerHTML = '<p>Fayl boşdur.</p>'; return; }
      let html = '<table><thead><tr>';
      rows[0].forEach(h => html += `<th>${h ?? ''}</th>`);
      html += '</tr></thead><tbody>';
      rows.slice(1).forEach(row => {
        html += '<tr>';
        rows[0].forEach((_, i) => html += `<td>${row[i] ?? ''}</td>`);
        html += '</tr>';
      });
      html += '</tbody></table>';
      preview.innerHTML = html;
    }

    async function analyzeData() {
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = '⏳ Analiz edilir...';
      result.style.display = 'none';

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: tableData })
        });
        const json = await response.json();
        resultText.textContent = json.answer;
        result.style.display = 'block';
      } catch (err) {
        resultText.textContent = 'Xəta baş verdi: ' + err.message;
        result.style.display = 'block';
      }

      analyzeBtn.disabled = false;
      analyzeBtn.textContent = '🤖 AI ilə Xətaları Analiz Et';
    }
  </script>
</body>
</html>
